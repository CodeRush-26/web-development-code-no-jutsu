services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-backend
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - PORT=3001
      - NODE_ENV=production
      - TICK_MS=1000
      - CORS_ORIGIN=*
    ports:
      - "3001:3001"
    networks:
      - fleet-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
    container_name: fleet-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - fleet-net
    restart: unless-stopped

networks:
  fleet-net:
    driver: bridge
